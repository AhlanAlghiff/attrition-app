<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Attrition App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="app-logo">A</span>
                <span class="app-title">Attrition App</span>
            </div>
            <nav class="nav-menu">
                <a href="/dashboard" class="nav-link">Dashboard Analitik</a>
                <a href="/predict" class="nav-link">Prediksi Attrition</a>
            </nav>
        </aside>
        <div class="main-content">
            <header class="main-header">
                <span class="main-header-title">{{ page_title if page_title is defined else 'Attrition App' }}</span>
            </header>
            <main>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
